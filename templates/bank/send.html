<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>송금</title>
    <link rel="stylesheet" href="{{ url_for('static',filename='css/bank/deposit.css') }}">
</head>
<body>
    <div id="deposit_wrap">
        <h1>송금</h1>
        <div>
            ₩ {{ account.balance }}
        </div>
        <form method="POST">
            <div class="row">
                <label>은행</label>
                <select name="bank">
                    <option>DW은행</option>
                    <option>신라</option>
                    <option>kr민국</option>
                    <option>농업협회</option>
                </select>
            </div>
            <div class="row">
                <label>받는 사람</label>
                <input type="text" name="receiver">
            </div>
            <div class="row">
                <label>계좌번호</label>
                <input type="text" name="accountNo">
            </div>
            <div class="row">
                <label>금액</label>
                <input type="number" name="money">
            </div>
            <div class="row">
                <label>보내는 내용</label>
                <input type="text" name="memo">
            </div>
            <button>송금 완료</button>
        </form>
    </div>
</body>
</html>
